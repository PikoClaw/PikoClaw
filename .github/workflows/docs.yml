name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PikoClaw
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package.json

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build docs
        working-directory: docs
        run: npm run build
        # Output lands in docs/.vitepress/dist/

      - name: Checkout pikoclaw-website
        uses: actions/checkout@v4
        with:
          repository: pikoclaw/pikoclaw-website
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website-repo

      - name: Copy built docs into website /docs folder
        run: |
          # Wipe old /docs content, keep everything else (index.html, CNAME, etc.)
          rm -rf website-repo/docs
          cp -r docs/.vitepress/dist website-repo/docs

      - name: Preserve CNAME (GitHub Pages custom domain)
        run: |
          # CNAME must live at repo root, not inside /docs — already there, nothing to do
          echo "pikoclaw.com" > website-repo/CNAME

      - name: Generate sitemap.xml
        run: |
          BASE_URL="https://pikoclaw.com"
          OUTPUT="website-repo/docs/sitemap.xml"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$OUTPUT"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$OUTPUT"

          find website-repo/docs -name "*.html" \
            ! -name "404.html" \
            | sort \
            | while read -r file; do
                path="${file#website-repo/docs/}"
                path="${path%index.html}"
                path="${path%.html}"
                if [[ "$path" == */ ]] || [[ "$path" == "" ]]; then
                  url="${BASE_URL}/${path}"
                else
                  url="${BASE_URL}/${path}/"
                fi
                echo "  <url>" >> "$OUTPUT"
                echo "    <loc>${url}</loc>" >> "$OUTPUT"
                echo "    <lastmod>${NOW}</lastmod>" >> "$OUTPUT"
                echo "  </url>" >> "$OUTPUT"
              done

          echo '</urlset>' >> "$OUTPUT"

      - name: Commit and push to pikoclaw-website
        working-directory: website-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ sitemap.xml
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "docs: rebuild from PikoClaw@${{ github.sha }}"
          git push
