name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: pikoclaw-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pikoclaw-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pikoclaw-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pikoclaw-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/pikoclaw ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/pikoclaw.exe ${{ matrix.artifact }}

      - name: Compute SHA256 (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        run: certutil -hashfile ${{ matrix.artifact }} SHA256 | findstr /v "hash" | findstr /v "CertUtil" > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pikoclaw-linux-x86_64/pikoclaw-linux-x86_64
            pikoclaw-macos-x86_64/pikoclaw-macos-x86_64
            pikoclaw-macos-aarch64/pikoclaw-macos-aarch64
            pikoclaw-windows-x86_64.exe/pikoclaw-windows-x86_64.exe

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Read SHA256 hashes
        id: sha
        run: |
          echo "linux_x86_64=$(cat pikoclaw-linux-x86_64/pikoclaw-linux-x86_64.sha256)" >> $GITHUB_OUTPUT
          echo "macos_x86_64=$(cat pikoclaw-macos-x86_64/pikoclaw-macos-x86_64.sha256)" >> $GITHUB_OUTPUT
          echo "macos_aarch64=$(cat pikoclaw-macos-aarch64/pikoclaw-macos-aarch64.sha256)" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: PikoClaw/homebrew-pikoclaw
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-pikoclaw

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64 }}
          SHA_MACOS_X86_64: ${{ steps.sha.outputs.macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ steps.sha.outputs.macos_aarch64 }}
        run: |
          VERSION="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew-pikoclaw/Formula/pikoclaw.rb
          sed -i "/pikoclaw-macos-aarch64/{n;s/sha256 \".*\"/sha256 \"${SHA_MACOS_AARCH64}\"/}" homebrew-pikoclaw/Formula/pikoclaw.rb
          sed -i "/pikoclaw-macos-x86_64/{n;s/sha256 \".*\"/sha256 \"${SHA_MACOS_X86_64}\"/}" homebrew-pikoclaw/Formula/pikoclaw.rb
          sed -i "/pikoclaw-linux-x86_64/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_X86_64}\"/}" homebrew-pikoclaw/Formula/pikoclaw.rb

      - name: Commit and push
        working-directory: homebrew-pikoclaw
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pikoclaw.rb
          git commit -m "pikoclaw ${{ github.ref_name }}"
          git push
